<script src="https://cdn.tailwindcss.com"></script>

<body class="bg-black text-white">

<!-- HEADER -->
<header class="flex justify-between items-center p-5 border-b border-white/10">
  <h1 class="font-bold text-xl">Vedxant FX</h1>

  <button onclick="window.location.href='https://rzp.io/rzp/Dxrb1E7'"
  class="bg-green-500 px-4 py-2 rounded text-black font-bold">
  Buy Now
  </button>
</header>

<!-- HERO -->
<section class="text-center py-20">

  <h2 class="text-4xl font-bold mb-4">
    FX Liquidity Matrix Pro

  <p class="text-gray-400 mb-8">
    Smart Money Indicator with Liquidity + BOS + Auto TP/SL

    class="bg-green-500 px-6 py-3 rounded text-black font-bold">
    Buy Lifetime ₹9999

    class="bg-white/10 px-6 py-3 rounded border border-white/20">
    Monthly ₹2999

  </div>

<!-- FEATURES -->
<section class="py-16 text-center">

  <h3 class="text-2xl font-bold mb-10">Features</h3>

  <div class="grid md:grid-cols-3 gap-6 px-6">

    <div class="border border-white/10 p-5 rounded">
      Liquidity Sweep Detection
    </div>

    <div class="border border-white/10 p-5 rounded">
      Break of Structure (BOS)
    </div>

    <div class="border border-white/10 p-5 rounded">
      Auto TP/SL System
    </div>

  </div>

</section>

<!-- PRICING -->
<section class="py-16 text-center border-t border-white/10">

  <h3 class="text-2xl font-bold mb-10">Pricing</h3>

  <div class="flex flex-col md:flex-row justify-center gap-6">

    <!-- Monthly -->
    <div class="border border-white/10 p-6 rounded w-72">
      <h4 class="text-xl font-bold mb-2">Monthly</h4>
      <p class="text-gray-400 mb-4">₹2999 / month</p>

      <button onclick="window.location.href='https://rzp.io/rzp/BU1NKPz'"
      class="w-full bg-white/10 py-3 rounded">
      Buy Monthly
      </button>
    </div>

    <!-- Lifetime -->
    <div class="border border-green-500 p-6 rounded w-72">
      <h4 class="text-xl font-bold mb-2">Lifetime</h4>
      <p class="text-green-400 mb-4">₹9999 One Time</p>

      <button onclick="window.location.href='https://rzp.io/rzp/Dxrb1E7'"
      class="w-full bg-green-500 py-3 rounded text-black font-bold">
      Buy Lifetime
      </button>
    </div>

<!-- FORM -->
<section class="py-16 text-center border-t border-white/10">

  <h3 class="text-2xl font-bold mb-6">Get Access</h3>

  <form class="max-w-md mx-auto flex flex-col gap-4">

    <input placeholder="TradingView Username"
    class="p-3 rounded bg-black border border-white/20">

    <input placeholder="Email"
    class="p-3 rounded bg-black border border-white/20">

    <button class="bg-green-500 py-3 rounded text-black font-bold">
      Submit
    </button>

  </form>

<!-- FOOTER -->
<footer class="text-center py-6 border-t border-white/10 text-gray-500">
© 2026 Vedxant
